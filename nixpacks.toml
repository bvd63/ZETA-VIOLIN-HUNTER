[phases.setup]
nixPkgs = ['python311', 'gcc', 'libffi', 'pkg-config']

[phases.install]
cmds = [
  'python -m venv --copies /opt/venv',
  '. /opt/venv/bin/activate && pip install --upgrade pip setuptools wheel',
  '. /opt/venv/bin/activate && pip install -r requirements.txt',
  '. /opt/venv/bin/activate && playwright install --with-deps chromium',
]

[phases.build]
cmds = ['echo "Build complete"']

[start]
cmd = '. /opt/venv/bin/activate && python main.py'
